name: Deploy Backend UTSCLOUD

on:
  push:
    branches: [main] # Jalankan setiap push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Private Server via Nginx Proxy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Jembatan (Nginx)
          proxy_host: ${{ secrets.NGINX_HOST }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/health/UTSCLOUD
            # Update source code
            git pull origin main

            # Update file .env dari GitHub Secrets
            echo "${{ secrets.ENV_CONTENT }}" > .env

            # Rebuild dan Restart Docker
            sudo docker-compose down
            sudo docker-compose up -d --build

            # Bersihkan image lama yang tidak terpakai
            sudo docker image prune -f
